<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo & Blackout Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #4a90e2; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; --dark: #212529; --win-gold: #f1c40f; }
        body { font-family: system-ui, sans-serif; background: #f8f9fa; margin: 0; padding: 15px; padding-bottom: 80px; }
        
        .menu-btn-fixed { position: fixed; top: 15px; right: 15px; z-index: 1000; width: 45px; height: 45px; border-radius: 50%; background: var(--dark); color: white; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #menuContent { display: none; position: fixed; top: 70px; right: 15px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 999; border: 1px solid #dee2e6; min-width: 250px; max-height: 80vh; overflow-y: auto; }

        .set-manager { margin-top: 15px; padding-top: 15px; border-top: 2px solid #eee; }
        .set-item { display: flex; justify-content: space-between; align-items: center; background: #f1f3f5; padding: 8px; border-radius: 6px; margin-bottom: 5px; font-size: 0.85rem; }
        .set-actions button { padding: 4px 8px; font-size: 0.7rem; margin-left: 4px; }

        #caller-board-area { display: none; background: #2c3e50; border-radius: 12px; padding: 15px; margin-bottom: 25px; border: 1px solid #1a252f; box-shadow: inset 0 2px 10px rgba(0,0,0,0.3); margin-top: 10px; }
        .caller-grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 4px; margin-bottom: 12px; }
        .caller-ball { aspect-ratio: 1/1; border: 1px solid #455a64; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; background: #34495e; cursor: pointer; font-size: 0.7rem; color: #bdc3c7; transition: all 0.2s; }
        .caller-ball.active-hit { background: var(--success); color: white; border-color: #2ecc71; box-shadow: 0 0 8px rgba(46, 204, 113, 0.4); }
        .caller-ball.active-miss { background: var(--danger); color: white; border-color: #c0392b; opacity: 0.8; }

        .caller-status-area { background: #1a252f; border-radius: 8px; padding: 10px; font-size: 0.8rem; max-height: 150px; overflow-y: auto; text-align: left; color: #ecf0f1; border: 1px solid #111; }
        .win-list-item { margin-bottom: 6px; padding: 6px 10px; border-left: 4px solid var(--win-gold); background: rgba(255,255,255,0.05); border-radius: 4px; }

        .cards-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 768px) { .cards-container { grid-template-columns: repeat(4, 1fr); } }

        .bingo-card { background: white; padding: 8px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 2px solid #444; position: relative; transition: all 0.3s ease; }
        .bingo-card.custom-colored { border-color: var(--card-color); }
        .winner { border: 3px solid var(--win-gold) !important; transform: scale(1.02); z-index: 10; box-shadow: 0 0 20px rgba(241, 196, 15, 0.4); }
        .win-badge { display: none; text-align: center; font-weight: 900; padding: 2px; border-radius: 4px; margin-bottom: 4px; font-size: 0.8rem; }
        .winner .win-badge.bingo { display: block; background: var(--win-gold); color: black; }
        .winner.winner-blackout .win-badge.blackout { display: block; background: var(--dark); color: white; }
        
        .to-go-counter { font-size: 0.75rem; font-weight: 800; color: var(--danger); text-align: center; margin-bottom: 4px; background: #ffe3e3; border-radius: 4px; padding: 2px; }

        .grid-wrapper { position: relative; width: 100%; }
        .bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; background: #444; border: 1px solid #444; }
        .custom-colored .bingo-grid { background: var(--card-color); border-color: var(--card-color); }

        .strike-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; display: none; }
        .winner:not(.winner-blackout) .strike-svg { display: block; }

        .letter-header { background: #f1f3f5; text-align: center; font-weight: bold; font-size: 0.7rem; padding: 4px 0; color: var(--primary); }
        .custom-colored .letter-header { color: var(--card-color); }
        
        .cell { aspect-ratio: 1/1; background: white; display: flex; align-items: center; justify-content: center; position: relative; font-weight: bold; font-size: clamp(0.75rem, 2.5vw, 1.1rem); overflow: hidden; touch-action: manipulation; }
        .custom-colored .cell:not(.free-slot) { color: var(--card-color); }
        
        .locked .cell.marked { background-color: var(--success) !important; color: white !important; }
        .custom-colored.locked .cell.marked { background-color: var(--card-color) !important; color: white !important; }
        .locked .cell.marked::after { content: ""; position: absolute; width: 70%; height: 70%; border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; }
        .locked .cell.near-win:not(.marked) { color: var(--warning) !important; }
        .locked .cell.near-win:not(.marked)::before { content: ""; position: absolute; width: 75%; height: 75%; border: 3px dashed var(--warning); border-radius: 50%; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0%, 100% { transform: scale(0.85); opacity: 0.5; } 50% { transform: scale(1); opacity: 1; } }

        .cell input { width: 100%; height: 100%; border: none; text-align: center; font-weight: bold; outline: none; background: transparent; font-size: inherit; appearance: textfield; padding: 0; color: inherit; }
        .free-slot { background: #fff9db; font-size: 0.55rem; color: #f08c00; text-align: center; font-weight: 900; }
        .custom-colored .free-slot { color: var(--card-color); }

        button { padding: 10px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        .btn-stack { display: flex; flex-direction: column; gap: 10px; }
        .btn-play { background: var(--success); color: white; width: 100%; }
        .btn-end { background: var(--danger); color: white; width: 100%; }
        .btn-caller { background: var(--primary); color: white; width: 100%; }
        
        .mode-toggle { background: #f1f3f5; padding: 10px; border-radius: 50px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; border: 1px solid #ccc; font-size: 0.8rem; }
        
        #scanner-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        #adminPanel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; color: white; }
        #reader { width: 300px; max-width: 90%; background: white; border-radius: 8px; overflow: hidden; }
        
        .color-picker-input { width: 24px; height: 24px; padding: 0; border: none; background: transparent; cursor: pointer; }
    </style>
</head>
<body>

<div id="scanner-container">
    <div id="reader"></div>
    <button onclick="stopScanner()" style="margin-top: 20px; background: var(--danger); color: white;">Close Scanner</button>
</div>

<div id="adminPanel">
    <h3 style="margin:0; color:var(--warning)">HOST TOOLS</h3>
    <div style="display: flex; gap: 10px; margin: 15px 0;">
        <button style="background:var(--danger); color:white;" onclick="handleForceEdit()">FORCE SETUP MODE</button>
        <button id="recordingBtn" style="background:#555; color:white;" onclick="toggleRecording()">REC: OFF</button>
    </div>
    <button style="background:var(--win-gold); color:black; margin-bottom: 15px; width: 200px;" onclick="addHotCard()">🔥 CREATE HOT CARD</button>
    <div id="universalQR" style="background:white; padding:10px; border-radius:8px; margin-bottom: 20px;"></div>
    
    <div style="display:flex; gap:10px;">
        <button onclick="hideAdmin()" style="background:#444; color:white;">Hide Panel</button>
        <button onclick="logoutAdmin()" style="background:var(--danger); color:white;">Log Out</button>
    </div>
</div>

<button class="menu-btn-fixed" onclick="toggleMenu()">☰</button>

<div id="menuContent">
    <div id="editButtons">
        <div class="mode-toggle">
            <input type="radio" id="modeBingo" name="gameMode" value="bingo" checked>
            <label for="modeBingo" style="margin: 0 10px;">BINGO</label>
            <span style="color:#ccc;">|</span>
            <input type="radio" id="modeBlackout" name="gameMode" value="blackout">
            <label for="modeBlackout" style="margin: 0 10px;">BLACKOUT</label>
        </div>
        <div class="btn-stack">
            <button style="background:#e9ecef; color:#444; border:1px solid #adb5bd;" onclick="addCard()">+ Add Card</button>
            <button class="btn-play" onclick="setPlayMode(true)">▶ START GAME</button>
        </div>

        <div class="set-manager">
            <p style="margin:0 0 8px 0; font-weight:bold; font-size:0.8rem; color:#666;">SAVED CARD SETS</p>
            <button onclick="saveCurrentSet()" style="width:100%; background:var(--primary); color:white; font-size:0.75rem; margin-bottom:10px;">💾 Save Current Layout</button>
            <div id="savedSetsList"></div>
        </div>
    </div>
    
    <div id="playButtons" style="display:none;" class="btn-stack">
        <button class="btn-caller" id="toggleCallerBtn" onclick="toggleCallerBoard()">📟 CALLER BOARD</button>
        <button style="background:#6c757d; color:white;" onclick="startScanner()">📷 SCAN EDIT</button>
        <button class="btn-end" onclick="nextRound()">🔄 END GAME</button>
    </div>

    <div style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; text-align: center;">
        <button id="adminPortalBtn" onclick="openAdmin()" style="background: transparent; color: #ced4da; font-size: 0.7rem; border: none; cursor: pointer;">Admin Panel</button>
    </div>
</div>

<div id="caller-board-area">
    <div class="caller-grid" id="callerGridDisplay"></div>
    <div class="caller-status-area" id="callerStatusList"></div>
</div>

<div class="cards-container" id="cardsContainer"></div>

<script>
    const ADMIN_PASS = "SuperAdmin";
    const EDIT_SECRET = "BINGO_EDIT_2026";
    let cards = JSON.parse(localStorage.getItem('bingo_v2_data')) || [];
    let isLocked = JSON.parse(localStorage.getItem('bingo_v2_lock')) || false;
    let gameMode = localStorage.getItem('bingo_v2_mode') || 'bingo';
    let calledBalls = JSON.parse(localStorage.getItem('bingo_v2_balls')) || [];
    let customSets = JSON.parse(localStorage.getItem('bingo_v3_sets')) || {};
    let isRecording = JSON.parse(localStorage.getItem('bingo_v3_recording')) || false;
    let ballHistory = JSON.parse(localStorage.getItem('bingo_v3_history')) || {};
    let isAdminLoggedIn = JSON.parse(localStorage.getItem('bingo_v3_admin_state')) || false;
    let html5QrCode;

    const PATTERNS = [
        {id:'r0', p:[0,1,2,3,4]}, {id:'r1', p:[5,6,7,8,9]}, {id:'r2', p:[10,11,12,13,14]}, {id:'r3', p:[15,16,17,18,19]}, {id:'r4', p:[20,21,22,23,24]},
        {id:'c0', p:[0,5,10,15,20]}, {id:'c1', p:[1,6,11,16,21]}, {id:'c2', p:[2,7,12,17,22]}, {id:'c3', p:[3,8,13,18,23]}, {id:'c4', p:[4,9,14,19,24]},
        {id:'d1', p:[0,6,12,18,24]}, {id:'d2', p:[4,8,12,16,20]}
    ];

    function save() { 
        localStorage.setItem('bingo_v2_data', JSON.stringify(cards));
        localStorage.setItem('bingo_v2_lock', isLocked);
        localStorage.setItem('bingo_v2_mode', gameMode);
        localStorage.setItem('bingo_v2_balls', JSON.stringify(calledBalls));
        localStorage.setItem('bingo_v3_sets', JSON.stringify(customSets));
        localStorage.setItem('bingo_v3_recording', isRecording);
        localStorage.setItem('bingo_v3_history', JSON.stringify(ballHistory));
        localStorage.setItem('bingo_v3_admin_state', isAdminLoggedIn);
    }

    function toggleRecording() {
        isRecording = !isRecording;
        document.getElementById('recordingBtn').innerText = isRecording ? "REC: ON" : "REC: OFF";
        document.getElementById('recordingBtn').style.background = isRecording ? "var(--danger)" : "#555";
        save();
    }

    function adminShuffle(cardId) {
        const card = cards.find(c => c.id === cardId);
        if (!card) return;
        const columns = [[], [], [], [], []];
        card.data.forEach((val, i) => { columns[i % 5].push(val); });
        columns.forEach(col => col.sort(() => Math.random() - 0.5));
        const newData = Array(25);
        for (let r = 0; r < 5; r++) {
            for (let c = 0; c < 5; c++) {
                newData[r * 5 + c] = (r === 2 && c === 2) ? "" : columns[c][r];
            }
        }
        card.data = newData;
        save(); render();
    }

    function addHotCard() {
        const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
        const hotData = Array(25).fill("");
        for (let col = 0; col < 5; col++) {
            let pool = Array.from({length: 15}, (_, i) => i + ranges[col][0]);
            pool.sort((a, b) => (ballHistory[b] || 0) - (ballHistory[a] || 0) || Math.random() - 0.5);
            for (let row = 0; row < 5; row++) {
                if (row === 2 && col === 2) continue;
                hotData[row * 5 + col] = pool[row];
            }
        }
        cards.push({ id: Date.now(), data: hotData, color: "#f1c40f", marks: [] });
        save(); render(); hideAdmin();
    }

    function openAdmin() { 
        if (isAdminLoggedIn || prompt("Admin Pass:") === ADMIN_PASS) { 
            isAdminLoggedIn = true;
            document.getElementById('adminPanel').style.display = 'flex'; 
            document.getElementById('menuContent').style.display = 'none'; 
            document.getElementById('adminPortalBtn').innerText = "Admin Panel (Active)";
            document.getElementById('adminPortalBtn').style.color = "var(--success)";
            generateQRs(); 
            save(); render();
        } 
    }

    function hideAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

    function logoutAdmin() {
        if(confirm("Log out of Admin? Buttons will be hidden.")) {
            isAdminLoggedIn = false;
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('adminPortalBtn').innerText = "Admin Panel";
            document.getElementById('adminPortalBtn').style.color = "#ced4da";
            save(); render();
        }
    }

    function saveCurrentSet() {
        const name = prompt("Name this card set:");
        if (name) { customSets[name] = JSON.parse(JSON.stringify(cards)); save(); renderSets(); }
    }

    function loadSet(name) {
        if (confirm(`Load "${name}"?`)) { cards = JSON.parse(JSON.stringify(customSets[name])); save(); render(); toggleMenu(); }
    }

    function deleteSet(name) {
        if (confirm(`Delete set "${name}"?`)) { delete customSets[name]; save(); renderSets(); }
    }

    function renderSets() {
        const list = document.getElementById('savedSetsList');
        list.innerHTML = '';
        Object.keys(customSets).forEach(name => {
            const div = document.createElement('div');
            div.className = 'set-item';
            div.innerHTML = `<span>${name}</span><div class="set-actions"><button style="background:var(--success); color:white;" onclick="loadSet('${name}')">LOAD</button><button style="background:var(--danger); color:white;" onclick="deleteSet('${name}')">✕</button></div>`;
            list.appendChild(div);
        });
    }

    function toggleMenu() {
        const content = document.getElementById('menuContent');
        content.style.display = (content.style.display === 'block') ? 'none' : 'block';
        if(content.style.display === 'block') renderSets();
    }

    function setPlayMode(state) {
        if(state) gameMode = document.querySelector('input[name="gameMode"]:checked').value;
        isLocked = state;
        save(); render();
        document.getElementById('menuContent').style.display = 'none';
        if(state) {
            document.getElementById('caller-board-area').style.display = 'block';
            renderCallerGrid();
        }
    }

    function nextRound() {
        if(confirm("End game and clear?")) {
            cards.forEach(c => { c.marks = []; c.winPattern = null; });
            calledBalls = [];
            save(); render(); renderCallerGrid();
            document.getElementById('menuContent').style.display = 'none';
        }
    }

    function toggleCallerBoard() {
        const area = document.getElementById('caller-board-area');
        const btn = document.getElementById('toggleCallerBtn');
        area.style.display = (area.style.display === 'block') ? 'none' : 'block';
        btn.innerText = (area.style.display === 'block') ? "📟 HIDE BOARD" : "📟 CALLER BOARD";
        if(area.style.display === 'block') renderCallerGrid();
        document.getElementById('menuContent').style.display = 'none';
    }

    function numberExistsInCards(num) {
        return cards.some(card => card.data.some(val => Number(val) === num));
    }

    function renderCallerGrid() {
        const grid = document.getElementById('callerGridDisplay');
        const statusList = document.getElementById('callerStatusList');
        if(!grid) return;
        grid.innerHTML = ''; statusList.innerHTML = '';

        const hotNumbers = new Set();
        cards.forEach(card => {
            if (card.winPattern) return;
            const marks = new Set(card.marks); marks.add(12);
            if (gameMode === 'bingo') {
                PATTERNS.forEach(pat => {
                    const missing = pat.p.filter(idx => !marks.has(idx));
                    if (missing.length === 1) hotNumbers.add(Number(card.data[missing[0]]));
                });
            } else {
                const missing = Array.from({length: 25}, (_, i) => i).filter(idx => idx !== 12 && !marks.has(idx));
                if (missing.length <= 5) missing.forEach(idx => hotNumbers.add(Number(card.data[idx])));
            }
        });

        for(let i=1; i<=75; i++) {
            const ball = document.createElement('div');
            const isCalled = calledBalls.includes(i);
            const existsOnCard = numberExistsInCards(i);
            
            if (isCalled) {
                ball.className = `caller-ball ${existsOnCard ? 'active-hit' : 'active-miss'}`;
            } else {
                ball.className = `caller-ball`;
                if (hotNumbers.has(i)) {
                    ball.style.borderColor = 'var(--win-gold)';
                    ball.style.boxShadow = '0 0 10px rgba(241, 196, 15, 0.6)';
                    ball.style.color = 'var(--win-gold)';
                }
            }
            ball.innerText = i;
            ball.onclick = () => toggleMasterBall(i);
            grid.appendChild(ball);
        }

        // RENDER LAST BALL STATUS LIST
        cards.forEach((card, idx) => {
            let info = "";
            if (card.winPattern) {
                info = `<div class="win-list-item" style="border-left-color: var(--success)"><strong>Card ${idx+1}: WIN!</strong></div>`;
            } else {
                const marks = new Set(card.marks); marks.add(12);
                if (gameMode === 'bingo') {
                    let paths = [];
                    PATTERNS.forEach(pat => {
                        const missing = pat.p.filter(index => !marks.has(index));
                        if (missing.length === 1) paths.push(`<b style="color:var(--win-gold)">${card.data[missing[0]]}</b>`);
                    });
                    if (paths.length > 0) info = `<div class="win-list-item"><strong>Card ${idx+1}:</strong> Needs [${[...new Set(paths)].join(', ')}]</div>`;
                } else {
                    const missing = Array.from({length: 25}, (_, i) => i).filter(idx => idx !== 12 && !marks.has(idx));
                    if (missing.length <= 5) {
                        const missingNums = missing.map(idx => `<b style="color:var(--danger)">${card.data[idx]}</b>`).join(', ');
                        info = `<div class="win-list-item" style="border-left-color: var(--danger)"><strong>Card ${idx+1}:</strong> ${missing.length} left [${missingNums}]</div>`;
                    }
                }
            }
            statusList.innerHTML += info;
        });
    }

    function toggleMasterBall(num) {
        if(calledBalls.includes(num)) {
            calledBalls = calledBalls.filter(b => b !== num);
        } else {
            calledBalls.push(num);
            if (isRecording) ballHistory[num] = (ballHistory[num] || 0) + 1;
        }
        cards.forEach(card => {
            card.marks = [];
            card.data.forEach((val, i) => { if(calledBalls.includes(Number(val))) card.marks.push(i); });
            analyzeCard(card);
        });
        save(); render(); renderCallerGrid();
    }

    function analyzeCard(card) {
        const marks = new Set(card.marks); marks.add(12);
        card.winPattern = null;
        if (gameMode === 'bingo') {
            PATTERNS.forEach(pat => { if (pat.p.filter(idx => !marks.has(idx)).length === 0) card.winPattern = pat.id; });
        } else {
            if (Array.from({length: 25}, (_, i) => i).filter(idx => idx !== 12 && !marks.has(idx)).length === 0) card.winPattern = 'blackout';
        }
    }

    function toggleMark(cardId, cellIndex) {
        if (!isLocked || cellIndex === 12) return;
        toggleMasterBall(Number(cards.find(c => c.id === cardId).data[cellIndex]));
    }

    function render() {
        const container = document.getElementById('cardsContainer');
        document.getElementById('editButtons').style.display = isLocked ? 'none' : 'block';
        document.getElementById('playButtons').style.display = isLocked ? 'flex' : 'none';
        container.innerHTML = '';

        cards.forEach((card) => {
            const marks = new Set(card.marks); marks.add(12);
            const nearWinIndices = new Set();
            if (isLocked && !card.winPattern) {
                if (gameMode === 'bingo') {
                    PATTERNS.forEach(pat => { if (pat.p.filter(idx => !marks.has(idx)).length === 1) nearWinIndices.add(pat.p.find(idx => !marks.has(idx))); });
                } else {
                    const missing = Array.from({length: 25}, (_, i) => i).filter(idx => idx !== 12 && !marks.has(idx));
                    if (missing.length <= 5) missing.forEach(idx => nearWinIndices.add(idx));
                }
            }

            const cardEl = document.createElement('div');
            cardEl.className = `bingo-card ${card.winPattern ? 'winner' : ''} ${isLocked ? 'locked' : ''} ${card.winPattern === 'blackout' ? 'winner-blackout' : ''}`;
            if (card.color) { cardEl.classList.add('custom-colored'); cardEl.style.setProperty('--card-color', card.color); }

            let html = `<div class="win-badge bingo">BINGO!</div><div class="win-badge blackout">BLACKOUT!</div>`;
            if (isLocked && gameMode === 'blackout' && !card.winPattern) html += `<div class="to-go-counter">${Array.from({length: 25}, (_, i) => i).filter(idx => idx !== 12 && !marks.has(idx)).length} TO GO</div>`;
            
            if (!isLocked) {
                html = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                    <div style="display:flex; gap:5px; align-items:center;">
                        <input type="color" class="color-picker-input" value="${card.color || '#444444'}" oninput="updateCardColor(${card.id}, this.value)">
                        <button style="background:#4a90e2; color:white; padding:4px 8px; font-size:0.6rem;" onclick="autoFill(${card.id})">AUTO</button>
                        ${isAdminLoggedIn ? `<button style="background:var(--warning); color:white; padding:4px 8px; font-size:0.6rem;" onclick="adminShuffle(${card.id})">🔀 SHUFFLE</button>` : ''}
                    </div>
                    <button style="background:var(--danger); color:white; padding:4px 8px; font-size:0.6rem;" onclick="deleteCard(${card.id})">✕</button>
                </div>`;
            }
            
            cardEl.innerHTML = html;
            const gridWrapper = document.createElement('div'); gridWrapper.className = 'grid-wrapper';
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("class", "strike-svg"); svg.setAttribute("viewBox", "0 0 100 100");
            if (card.winPattern && gameMode === 'bingo') {
                const c = { 'r0':[5,10,95,10], 'r1':[5,30,95,30], 'r2':[5,50,95,50], 'r3':[5,70,95,70], 'r4':[5,90,95,90], 'c0':[10,5,10,95], 'c1':[30,5,30,95], 'c2':[50,5,50,95], 'c3':[70,5,70,95], 'c4':[90,5,90,95], 'd1':[5,5,95,95], 'd2':[95,5,5,95] }[card.winPattern];
                const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
                l.setAttribute("x1", c[0]); l.setAttribute("y1", c[1]); l.setAttribute("x2", c[2]); l.setAttribute("y2", c[3]);
                l.setAttribute("stroke", "rgba(231, 76, 60, 0.8)"); l.setAttribute("stroke-width", "4"); l.setAttribute("stroke-linecap", "round");
                svg.appendChild(l);
            }
            gridWrapper.appendChild(svg);
            const gridEl = document.createElement('div'); gridEl.className = 'bingo-grid';
            ['B','I','N','G','O'].forEach(l => { const h = document.createElement('div'); h.className = 'letter-header'; h.innerText = l; gridEl.appendChild(h); });

            card.data.forEach((val, i) => {
                const cell = document.createElement('div'); cell.className = 'cell' + (i === 12 ? ' free-slot' : '');
                if (isLocked) {
                    if (card.marks.includes(i) || i === 12) cell.classList.add('marked');
                    else if (nearWinIndices.has(i)) cell.classList.add('near-win');
                    cell.onclick = () => toggleMark(card.id, i);
                }
                if (i === 12) cell.innerText = "FREE";
                else if (!isLocked) {
                    const input = document.createElement('input'); input.type = "number"; input.value = val;
                    input.oninput = (e) => { card.data[i] = e.target.value; save(); }; cell.appendChild(input);
                } else cell.innerText = val;
                gridEl.appendChild(cell);
            });
            gridWrapper.appendChild(gridEl); cardEl.appendChild(gridWrapper); container.appendChild(cardEl);
        });
    }

    function addCard() { cards.push({ id: Date.now(), data: Array(25).fill(""), color: "#444444", marks: [] }); save(); render(); }
    function deleteCard(id) { cards=cards.filter(c=>c.id!==id); save(); render(); }
    function updateCardColor(id, color) { const card = cards.find(c => c.id === id); if(card) { card.color = color; save(); window.requestAnimationFrame(render); } }

    function autoFill(id) {
        const card = cards.find(c => c.id === id); const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
        for (let col = 0; col < 5; col++) {
            let pool = Array.from({length: 15}, (_, i) => i + ranges[col][0]).sort(() => Math.random() - 0.5);
            for (let row = 0; row < 5; row++) { if (row === 2 && col === 2) continue; card.data[row * 5 + col] = pool[row]; }
        }
        save(); render();
    }
    
    function generateQRs() { document.getElementById("universalQR").innerHTML = ""; new QRCode(document.getElementById("universalQR"), { text: EDIT_SECRET, width: 180, height: 180 }); }
    function handleForceEdit() { if(confirm("Force Setup Mode?")) { setPlayMode(false); hideAdmin(); } }
    function startScanner() {
        document.getElementById('scanner-container').style.display = 'flex';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => { if (text === EDIT_SECRET) { setPlayMode(false); stopScanner(); } });
    }
    function stopScanner() { if(html5QrCode) html5QrCode.stop().then(()=>document.getElementById('scanner-container').style.display='none'); }

    if(cards.length === 0) addCard();
    if(isAdminLoggedIn) {
        document.getElementById('adminPortalBtn').innerText = "Admin Panel (Active)";
        document.getElementById('adminPortalBtn').style.color = "var(--success)";
    }
    render();
    if(isLocked) {
        document.getElementById('caller-board-area').style.display = 'block';
        renderCallerGrid();
    }
</script>
</body>
</html>
